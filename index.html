<!DOCTYPE html>
<html lang="en">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECS Validation Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f4; margin: 0; }
        
        .controls { 
            display: grid; grid-template-columns: 1fr; gap: 15px;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;
        }

        label { font-weight: bold; font-size: 14px; color: #555; }

        select { 
            width: 100%; padding: 15px; font-size: 18px; 
            border-radius: 8px; border: 1px solid #ccc; background: #fff;
        }

        .plow-btn { background: #6c757d; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        .load-bldg-btn { 
            background: #28a745; color: white; border: none; padding: 20px; 
            font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer;
        }

        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #333; color: white; }

        .del-btn { background: #dc3545; color: white; border: none; padding: 8px; font-weight: bold; border-radius: 4px; cursor: pointer; }

        .export-btn {
            position: fixed; bottom: 20px; left: 5%; width: 90%;
            padding: 20px; background: #007bff; color: white;
            font-size: 20px; font-weight: bold; border: none; border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,123,255,0.4); cursor: pointer;
        }

        .container { margin-bottom: 120px; }
    </style>
</head>
<body>

<div class="container">
    <h2>MEH Validation Tool</h2>

    <div class="controls">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <button class="plow-btn" onclick="loadData()">🔄 Load PLOW</button>
            <span id="syncStatus" style="font-size: 12px; color: gray;">Not Synced</span>
        </div>

        <div>
            <label>Select Your Building</label>
            <select id="buildingSelect"></select>
        </div>

        <button class="load-bldg-btn" onclick="loadBuildingToTable()">LOAD BUILDING</button>
    </div>

    <table id="ecsTable">
        <thead>
            <tr>
                <th>Building</th>
                <th>ECS Code</th>
                <th>Validation</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<button class="export-btn" onclick="exportExcel()">Save Report</button>

<script src="app.js"></script>
</body>
</html>
