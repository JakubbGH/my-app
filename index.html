<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECS Validation Tool</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f4; margin: 0; }
        
        /* Login Screen */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #2c3e50; display: flex; justify-content: center; 
            align-items: center; z-index: 9999;
        }
        .login-box {
            background: white; padding: 30px; border-radius: 12px;
            width: 300px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .login-box input {
            width: 100%; padding: 12px; margin: 10px 0;
            border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
        }
        .login-box button {
            width: 100%; padding: 12px; background: #007bff;
            color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;
        }

        /* App UI */
        #mainApp { display: none; } /* Hidden until Auth success */
        
        .controls { 
            display: grid; grid-template-columns: 1fr; gap: 15px;
            background: white; padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;
        }
        label { font-weight: bold; font-size: 14px; color: #555; }
        select { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: 1px solid #ccc; }
        .plow-btn { background: #6c757d; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; }
        .load-bldg-btn { background: #28a745; color: white; border: none; padding: 20px; font-size: 20px; font-weight: bold; border-radius: 10px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 10px; }
        th, td { border-bottom: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #333; color: white; }
        .del-btn { background: #dc3545; color: white; border: none; padding: 8px; border-radius: 4px; cursor: pointer; }
        .export-btn { position: fixed; bottom: 20px; left: 5%; width: 90%; padding: 20px; background: #007bff; color: white; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; }
        .container { margin-bottom: 120px; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2 style="margin-top:0">Field Access</h2>
        <input type="email" id="emailInput" placeholder="Email Address">
        <input type="password" id="passInput" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <p id="loginError" style="color:red; font-size:12px; display:none;"></p>
    </div>
</div>

<div id="mainApp">
    <div class="container">
        <h2>MEH Validation Tool</h2>
        <div class="controls">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <button class="plow-btn" onclick="loadData()">🔄 Load PLOW</button>
                <span id="syncStatus" style="font-size: 12px; color: gray;">Not Synced</span>
            </div>
            <div>
                <label>Select Your Building</label>
                <select id="buildingSelect"></select>
            </div>
            <button class="load-bldg-btn" onclick="loadBuildingToTable()">LOAD BUILDING</button>
        </div>
        <table id="ecsTable">
            <thead>
                <tr>
                    <th>Building</th>
                    <th>ECS Code</th>
                    <th>Validation</th>
                    <th></th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
    <button class="export-btn" onclick="exportExcel()">Save Report</button>
</div>

<script src="app.js"></script>
</body>
</html>
