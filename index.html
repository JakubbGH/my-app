<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ECS Gate Status Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        :root {
            --primary: #1f4e79;
            --secondary: #f4f6f8;
            --danger: #dc3545;
            --danger-dark: #b02a37;
            --border: #d0d7de;
            --text: #222;
            --muted: #6c757d;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: var(--secondary);
            color: var(--text);
        }

        h1, h2 {
            margin-top: 0;
        }

        button,
        select,
        input {
            font-family: inherit;
            font-size: 14px;
        }

        button {
            cursor: pointer;
            border: none;
            border-radius: 6px;
            padding: 10px 14px;
            font-weight: bold;
        }

        input,
        select {
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            width: 100%;
            background: var(--white);
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .login-overlay {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
        }

        .login-box {
            background: var(--white);
            width: 92%;
            max-width: 380px;
            padding: 28px;
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
        }

        .login-box h2 {
            text-align: center;
            color: var(--primary);
        }

        .login-box input {
            margin-bottom: 12px;
        }

        .login-box button {
            width: 100%;
            background: var(--primary);
            color: white;
        }

        .login-error {
            display: none;
            margin-top: 12px;
            padding: 10px;
            background: #f8d7da;
            color: #842029;
            border-radius: 6px;
            font-size: 13px;
        }

        .app {
            display: none;
            max-width: 1250px;
            margin: 0 auto;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .top-bar h1 {
            color: var(--primary);
            margin-bottom: 0;
        }

        .sync-status {
            padding: 8px 12px;
            border-radius: 999px;
            background: #fff3cd;
            color: #664d03;
            font-weight: bold;
            font-size: 13px;
        }

        .card {
            background: white;
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 18px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 14px;
            align-items: end;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }

        .primary-btn {
            background: var(--primary);
            color: white;
        }

        .secondary-btn {
            background: #495057;
            color: white;
        }

        .success-btn {
            background: #198754;
            color: white;
        }

        .danger-btn,
        .del-btn {
            background: var(--danger);
            color: white;
        }

        .danger-btn:hover,
        .del-btn:hover {
            background: var(--danger-dark);
        }

        .del-btn {
            padding: 8px 10px;
            font-size: 12px;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            min-width: 950px;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: var(--primary);
            color: white;
            text-align: left;
            padding: 12px;
        }

        td {
            border-bottom: 1px solid var(--border);
            padding: 10px;
            vertical-align: middle;
        }

        .admin-section {
            display: none;
            border: 2px dashed var(--primary);
        }

        .muted {
            color: var(--muted);
            font-size: 13px;
        }

        .picker-section {
            display: none;
            margin-top: 14px;
        }

        @media (max-width: 800px) {
            .grid {
                grid-template-columns: 1fr;
            }

            button {
                width: 100%;
            }

            .actions {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box">
            <h2>ECS Tool Login</h2>

            <input id="emailInput" type="email" placeholder="Email">
            <input id="passInput" type="password" placeholder="Password">

            <button onclick="handleLogin()">LOGIN</button>

            <div id="loginError" class="login-error"></div>
        </div>
    </div>

    <main id="mainApp" class="app">

        <div class="top-bar">
            <h1>ECS Gate Status Tool</h1>

            <div class="actions">
                <span id="syncStatus" class="sync-status">Connecting...</span>
                <button class="secondary-btn" onclick="handleLogout()">LOGOUT</button>
            </div>
        </div>

        <section class="card">
            <h2>Create Report</h2>

            <div class="grid">
                <div>
                    <label for="buildingSelect">Building</label>
                    <select id="buildingSelect">
                        <option>Loading...</option>
                    </select>
                </div>

                <div>
                    <button class="primary-btn" onclick="loadRoomsForBuilding()">
                        LOAD ROOMS
                    </button>
                </div>

                <div>
                    <button class="secondary-btn" onclick="addOpportunisticEntry()">
                        ADD OPPORTUNISTIC ENTRY
                    </button>
                </div>
            </div>

            <div id="roomPicker" class="picker-section">
                <div class="grid">
                    <div>
                        <label for="roomSelect">Room ID</label>
                        <select id="roomSelect" onchange="loadEcsForRoom()">
                            <option>Select room...</option>
                        </select>
                    </div>

                    <div>
                        <label for="ecsCodeSelect">ECS Code</label>
                        <select id="ecsCodeSelect">
                            <option>Select ECS...</option>
                        </select>
                    </div>

                    <div>
                        <button class="success-btn" onclick="addSelectedEcsCode()">
                            ADD ECS TO REPORT
                        </button>
                    </div>
                </div>

                <p class="muted">
                    Select a room first, then select one ECS code available in that room.
                </p>
            </div>
        </section>

        <section class="card">
            <h2>Current Report</h2>

            <div class="table-wrap">
                <table id="ecsTable">
                    <thead>
                        <tr>
                            <th>Building</th>
                            <th>Room ID</th>
                            <th>ECS Code</th>
                            <th>Commodity</th>
                            <th>Gate Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                    <tbody></tbody>
                </table>
            </div>

            <div class="actions">
                <button id="mainSaveBtn" class="success-btn" onclick="saveToCloud()">
                    SAVE REPORT
                </button>

                <button class="danger-btn" onclick="clearCurrentReport()">
                    CLEAR CURRENT REPORT
                </button>
            </div>
        </section>

        <section id="adminSection" class="card admin-section">
            <h2>Admin</h2>

            <p class="muted">
                CSV format:
                <strong>Building,Room ID,ECS Code,Commodity</strong>
            </p>

            <input id="csvFileInput" type="file" accept=".csv">

            <div class="actions">
                <button id="uploadCsvBtn" class="primary-btn" onclick="processCSV()" style="display:none;">
                    UPLOAD CSV TO DATABASE
                </button>

                <button class="secondary-btn" onclick="exportAllReports()">
                    EXPORT ALL REPORTS
                </button>

                <button class="danger-btn" onclick="clearAllReports()">
                    CLEAR ALL REPORTS
                </button>

                <button class="danger-btn" onclick="wipeAllBuildings()">
                    WIPE MASTER BUILDING LIST
                </button>
            </div>
        </section>

    </main>

    <script src="app.js?v=3"></script>

</body>
</html>
