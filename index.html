<!DOCTYPE html>
<html>
<head>
    <title>ECS Validation Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 15px; background: #f4f4f4; }
        
        /* Compact Control Bar */
        .controls { 
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two columns to save horizontal space */
            gap: 10px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }

        select { 
            width: 100%; 
            padding: 12px; 
            font-size: 16px; 
            border-radius: 5px; 
            border: 1px solid #ccc;
        }

        .add-btn { 
            grid-column: span 2; /* Button takes full width of the grid */
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background: #333; color: white; }

        .val-select { width: 100%; padding: 8px; font-size: 14px; }

        .del-btn { 
            background: #dc3545; 
            color: white; 
            border: none; 
            padding: 10px; 
            width: 100%;
            font-weight: bold;
            border-radius: 4px;
        }

        .export-btn {
            position: fixed;
            bottom: 20px;
            left: 5%;
            width: 90%;
            padding: 20px;
            background: #007bff;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            box-shadow: 0 -4px 10px rgba(0,0,0,0.2);
        }

        /* Space for the fixed button at the bottom */
        .container { margin-bottom: 100px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Field Data Entry</h2>

    <div class="controls">
        <div>
            <label>Building</label>
            <select id="buildingSelect" onchange="updateEcsDropdown()"></select>
        </div>
        <div>
            <label>ECS Code</label>
            <select id="ecsSelect"></select>
        </div>
        <button class="add-btn" onclick="addRow()">+ ADD ROW</button>
    </div>

    <table id="ecsTable">
        <thead>
            <tr>
                <th>Building</th>
                <th>ECS</th>
                <th>Validation</th>
                <th></th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<button class="export-btn" onclick="exportExcel()">GENERATE EXCEL</button>

</body>
</html>
